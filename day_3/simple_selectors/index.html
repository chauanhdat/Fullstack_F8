<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple_selector</title>
    <link rel="stylesheet" href="/day_3/basic_selector/css/style.css">
</head>

<body>
    <!-- <a href="https://gemini.google.com/app/de1db7155d4b2b92">Bộ chọn cơ bản</a> -->
    <!-- <a href="https://www.w3schools.com/css/css_selectors.asp">Bộ chọn cơ bản w3school</a> -->
    <!-- Tiêu đề của trang -->
    <h2>Khóa học CSS cơ bản trực quan</h2>

    <!-- Thẻ p thông thường -->
    <p>Chào mừng bạn đến với bài thực hành...</p>

    <!-- Thẻ p sử dụng Class -->
    <p class="highlight-text">Đoạn văn này được gán một lớp...</p>

    <!-- Thẻ div sử dụng ID duy nhất -->
    <div id="unique-card">
        <p>Đây là chiếc hộp duy nhất...</p>
    </div>
</body>

</html>
