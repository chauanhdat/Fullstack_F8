<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Elements</title>
    <link rel="stylesheet" href="/day_3/pseudo_classes_and_elements/style.css/style.css">
</head>

<body>
    <!-- <a href="https://www.w3schools.com/cssref/css_ref_pseudo_classes.php">CSS Pseudo-classes</a> -->
    <!-- <a href="https://www.w3schools.com/cssref/css_ref_pseudo_elements.php">CSS Pseudo-elements</a> -->
    <!-- <a href="https://gemini.google.com/app/b5d4be63380e8c9b">Lớp giả (Pseudo-classes) và Phần tử giả
        (Pseudo-elements)</a> -->

    <!-- Nút bấm trải nghiệm lớp giả :hover -->
    <button class="sb-btn">Rê chuột lên mình đi!</button>

    <!-- Ô nhập liệu trải nghiệm :focus và ::placeholder -->
    <input type="text" class="sb-input" placeholder="Nhập từ khóa..." />

    <!-- Danh sách trải nghiệm bộ chọn vị trí :nth-child -->
    <ul class="sb-list">
        <li class="sb-item">1. Nhập môn HTML cơ bản</li>
        <li class="sb-item">2. Làm chủ thuộc tính CSS</li>
        <li class="sb-item">3. Responsive Web Design</li>
    </ul>

    <!-- Đoạn văn cách điệu bằng ::first-letter và ::before/::after -->
    <p class="sb-paragraph">Học lập trình web...</p>
    <div class="sb-tip">Hãy kiên trì thực hành...</div>
</body>

</html>
