<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>

    <!-- Nhúng font chữ Roboto từ Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Nhúng file reset.css để loại bỏ khoảng cách mặc định của các thẻ HTML -->
    <link rel="stylesheet" href="./assets/reset.css">

    <!-- Nhúng file style.css chứa mã CSS tùy chỉnh của trang -->
    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>
    <!-- Vùng chứa bọc toàn bộ nội dung trang -->
    <div class="container">

        <!-- Phần Header: Hiển thị tiêu đề chính của trang -->
        <header class="section-header">
            <span class="subtitle">Because We Love Coffee</span>
            <h1 class="title">About Us</h1>
        </header>

        <!-- Phần Nội dung chính: Sử dụng Grid Layout chia làm 3 cột -->
        <main class="grid-layout">

            <!-- Hàng 1 -->

            <!-- Khối 1: Ảnh 4 ly cà phê nghệ thuật -->
            <div class="grid-item img-item">
                <img src="./img/image_17.png" alt="Cà phê nghệ thuật latte">
            </div>

            <!-- Khối 2: Văn bản (Our Mission) -->
            <div class="grid-item text-item">
                <span class="item-subtitle">Our Mission</span>
                <h2 class="item-title">It all began with a modest concept: Create amazing coffee</h2>
            </div>

            <!-- Khối 3: Ảnh máy pha cà phê espresso -->
            <div class="grid-item img-item">
                <img src="./img/image_19.png" alt="Máy pha cà phê chuyên nghiệp">
            </div>

            <!-- Hàng 2 -->

            <!-- Khối 4: Văn bản (Home Delivery) -->
            <div class="grid-item text-item">
                <span class="item-subtitle">Home Delivery</span>
                <h2 class="item-title">Quality coffee delivered to your door</h2>
            </div>

            <!-- Khối 5: Ảnh tách cà phê đặt trên cuốn sách -->
            <div class="grid-item img-item">
                <img src="./img/image_18.png" alt="Tách cà phê trên sách báo">
            </div>

            <!-- Khối 6: Văn bản (Time To Chill) -->
            <div class="grid-item text-item">
                <span class="item-subtitle">Time To Chill</span>
                <h2 class="item-title">Black Coffee Shaved Ice</h2>
            </div>

        </main>

    </div>
</body>

</html>
